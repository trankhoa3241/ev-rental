<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EV Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="display-4">Bảng điều khiển người dùng</h1>
        <p class="lead">Chào mừng bạn đến với EV Rental!</p>
        
        <div class="row mt-4">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <i class="fas fa-car fa-3x text-primary mb-3"></i>
                        <h5 class="card-title">Chuyến đi sắp tới</h5>
                        <p class="display-6" th:text="${pending}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <i class="fas fa-history fa-3x text-secondary mb-3"></i>
                        <h5 class="card-title">Chuyến đi hoàn thành</h5>
                        <p class="display-6" th:text="${completed}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                        <h5 class="card-title">Chuyến đi đã duyệt</h5>
                        <p class="display-6" th:text="${confirmed}">0</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <i class="fas fa-wallet fa-3x text-success mb-3"></i>
                        <h5 class="card-title">Tổng chi tiêu</h5>
                        <p class="display-6" th:text="${#numbers.formatInteger(spent, 0)}">₫0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <a href="/auth/logout" class="btn btn-danger">Đăng xuất</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
