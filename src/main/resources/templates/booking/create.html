<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thuê xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">Đặt thuê xe</h1>

    <div th:if="${vehicle}">
        <div class="card mb-4">
            <div class="card-body">
                <h5 th:text="${vehicle.brand + ' ' + vehicle.model}"></h5>
                <p th:text="${vehicle.vehicleType}"></p>
                <p>Giá: <span th:text="${#numbers.formatInteger(vehicle.pricePerHour, 0)}"></span> đ/giờ</p>
            </div>
        </div>
    </div>

    <form th:action="@{/booking/create}" method="post" class="row g-3">
        <input type="hidden" name="vehicleId" th:value="${vehicle?.id}" />

        <div class="col-md-6">
            <label class="form-label">Ngày bắt đầu</label>
            <input type="datetime-local" name="startDate" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Ngày kết thúc</label>
            <input type="datetime-local" name="endDate" class="form-control" required>
        </div>

        <div class="col-12">
            <label class="form-label">Ghi chú</label>
            <textarea name="notes" class="form-control" rows="3"></textarea>
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Gửi yêu cầu thuê</button>
            <a th:href="@{/vehicles}" class="btn btn-secondary">Hủy</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
