<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn đặt xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">Chi tiết đơn đặt xe</h1>
    <div class="card mb-4">
        <div class="card-body">
            <h4 th:text="${rental.vehicle.brand + ' ' + rental.vehicle.model}"></h4>
            <p><strong>Người dùng:</strong> <span th:text="${rental.user.fullName}"></span> (<span th:text="${rental.user.email}"></span>)</p>
            <p><strong>Trạng thái:</strong> <span th:text="${rental.status}"></span></p>
            <p><strong>Thanh toán:</strong> <span th:text="${rental.paymentStatus}"></span></p>
            <p><strong>Thời gian:</strong> <span th:text="${#dates.format(rental.pickupDateTime, 'dd/MM/yyyy HH:mm')}"></span> - <span th:text="${#dates.format(rental.returnDateTime, 'dd/MM/yyyy HH:mm')}"></span></p>
            <p><strong>Giá:</strong> <span th:text="${#numbers.formatInteger(rental.totalPrice, 0)}"></span> đ</p>
            <p><strong>Ghi chú:</strong> <span th:text="${rental.notes != null ? rental.notes : 'Không có'}"></span></p>
        </div>
    </div>
    <a th:href="@{/admin/rentals}" class="btn btn-secondary">Quay lại quản lý</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
