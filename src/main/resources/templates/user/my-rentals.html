<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyến đi của tôi - EV Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="display-4">Lịch sử chuyến đi</h1>
        
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#ongoing">Chuyến sắp tới</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#completed">Đã hoàn thành</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#cancelled">Đã hủy</a>
            </li>
        </ul>

        <div class="tab-content">
            <div id="ongoing" class="tab-pane fade show active">
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <img src="https://via.placeholder.com/150" class="img-fluid rounded" alt="Vehicle">
                            </div>
                            <div class="col-md-6">
                                <h5>Tesla Model 3</h5>
                                <p class="text-muted">Ngày 20/03/2024 - 21/03/2024</p>
                                <p><strong>Tổng giá:</strong> ₫250,000</p>
                                <span class="badge bg-warning">Đang di chuyển</span>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary w-100 mb-2">Chi tiết</button>
                                <button class="btn btn-danger w-100">Huỷ chuyến</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="completed" class="tab-pane fade">
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <img src="https://via.placeholder.com/150" class="img-fluid rounded" alt="Vehicle">
                            </div>
                            <div class="col-md-6">
                                <h5>Honda Vision</h5>
                                <p class="text-muted">Ngày 15/03/2024 - 16/03/2024</p>
                                <p><strong>Tổng giá:</strong> ₫100,000</p>
                                <span class="badge bg-success">Hoàn thành</span>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary w-100">Chi tiết</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="cancelled" class="tab-pane fade">
                <p class="text-muted">Không có chuyến đi bị hủy</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
