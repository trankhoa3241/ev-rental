<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt xe: [[${vehicle.brand}]] [[${vehicle.model}]]</title>
    
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .price-summary { background: #f8f9fa; border-radius: 8px; padding: 15px; border-left: 4px solid #0d6efd; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="mb-4">Xác nhận đặt thuê xe</h1>

            <div th:if="${vehicle}" class="card mb-4 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="card-title text-primary" th:text="${vehicle.brand + ' ' + vehicle.model}"></h4>
                            <span class="badge bg-info text-dark" th:text="${vehicle.vehicleType}"></span>
                        </div>
                        <div class="text-end">
                            <p class="mb-0 text-muted">Đơn giá:</p>
                            <h5 class="text-success"><span id="basePrice" th:text="${vehicle.pricePerHour}"></span> đ/giờ</h5>
                        </div>
                    </div>
                </div>
            </div>

            <form th:action="@{/booking/create}" method="post" id="bookingForm" class="card shadow-sm p-4">
                <input type="hidden" id="vehicleId" name="vehicleId" th:value="${vehicle.id}" />

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Ngày bắt đầu</label>
                        <input type="datetime-local" id="startDate" name="startDate" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Ngày kết thúc</label>
                        <input type="datetime-local" id="endDate" name="endDate" class="form-control" required>
                    </div>

                    <div class="col-12 mt-3" id="validationResult" style="display: none;">
                        <div class="price-summary">
                            <div class="d-flex justify-content-between mb-2">
                                <span>Số giờ thuê:</span>
                                <strong id="displayHours">0 giờ</strong>
                            </div>
                            <div class="d-flex justify-content-between border-top pt-2">
                                <span class="h5">Tổng cộng tạm tính:</span>
                                <strong class="h5 text-danger" id="displayTotal">0 đ</strong>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Ghi chú thêm</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="Ví dụ: Tôi cần lấy xe sớm hơn 15p..."></textarea>
                    </div>

                    <div class="col-12 mt-4 d-flex gap-2">
                        <button type="submit" id="btnSubmit" class="btn btn-primary px-4" disabled>Gửi yêu cầu thuê</button>
                        <a th:href="@{/vehicles}" class="btn btn-outline-secondary px-4">Quay lại</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const vehicleId = document.getElementById('vehicleId').value;
    const btnSubmit = document.getElementById('btnSubmit');

    // Chặn chọn ngày quá khứ
    const now = new Date().toISOString().slice(0, 16);
    startDateInput.min = now;
    
    startDateInput.addEventListener('change', function() {
        endDateInput.min = startDateInput.value;
        validateAndCalculate();
    });

    endDateInput.addEventListener('change', validateAndCalculate);

    function validateAndCalculate() {
        const start = startDateInput.value;
        const end = endDateInput.value;

        if (start && end) {
            const params = new URLSearchParams({
                vehicleId: vehicleId,
                startDate: start,
                endDate: end
            });

            const csrfMeta = document.querySelector('meta[name="_csrf"]');
            const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');

            const token = csrfMeta ? csrfMeta.content : "";
            const header = csrfHeaderMeta ? csrfHeaderMeta.content : "";

            // Tạo object headers động
            const fetchHeaders = {
                'X-Requested-With': 'XMLHttpRequest'
            };

            // Chỉ thêm CSRF vào header nếu nó tồn tại và có tên hợp lệ
            if (header && token) {
                fetchHeaders[header] = token;
            }
            fetch(`/api/booking/validate?${params.toString()}`, {
                method: 'POST',
                headers: fetchHeaders // Dùng object headers đã xử lý ở trên
            })
            .then(res => res.json())
            .then(data => {
                const resultDiv = document.getElementById('validationResult');
                if (data.valid) {
                    resultDiv.style.display = 'block';
                    document.getElementById('displayHours').innerText = data.hours + " giờ";
                    document.getElementById('displayTotal').innerText = 
                        new Intl.NumberFormat('vi-VN').format(data.totalPrice) + " đ";
                    btnSubmit.disabled = false;
                } else {
                    resultDiv.style.display = 'none';
                    btnSubmit.disabled = true;
                    // THÊM DÒNG NÀY: Hiển thị lỗi từ Java gửi về (Ví dụ: Xe không khả dụng)
                    if(data.message) alert(data.message);
                }
            })
            .catch(err => {
                console.error("Lỗi kết nối API:", err);
                btnSubmit.disabled = true;
            });
        }
    }
</script>
</body>
</html>
