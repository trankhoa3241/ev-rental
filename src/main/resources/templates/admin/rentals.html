<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý yêu cầu thuê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4">Quản lý yêu cầu thuê xe</h1>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row">
            <div class="col-md-12">
                <h3>Đang xử lý</h3>
                <table class="table table-striped">
                    <thead>
                        <tr><th>Xe</th><th>Người dùng</th><th>Thời gian</th><th>Giá</th><th>Status</th><th>Hành động</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="rental : ${pending}">
                            <td th:text="${rental.vehicle.brand + ' ' + rental.vehicle.model}"></td>
                            <td th:text="${rental.user.email}"></td>
                            <td th:text="${#dates.format(rental.pickupDateTime, 'dd/MM/yyyy HH:mm')} + ' - ' + ${#dates.format(rental.returnDateTime, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${#numbers.formatInteger(rental.totalPrice, 0)}"></td>
                            <td><span class="badge bg-warning">Đang xử lý</span></td>
                            <td>
                                <a th:href="@{/admin/rentals/{id}(id=${rental.id})}" class="btn btn-sm btn-info">Chi tiết</a>
                                <form th:action="@{/admin/rentals/{id}/approve(id=${rental.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-success">Duyệt</button>
                                </form>
                                <form th:action="@{/admin/rentals/{id}/reject(id=${rental.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-danger">Từ chối</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <h3>Đã duyệt</h3>
                <ul class="list-group">
                    <li class="list-group-item" th:each="rental : ${confirmed}">
                        <strong th:text="${rental.vehicle.brand + ' ' + rental.vehicle.model}"></strong>
                        <span th:text="${rental.user.email}"></span>
                        <span class="badge bg-success float-end">Đã duyệt</span>
                    </li>
                </ul>
            </div>
            <div class="col-md-6">
                <h3>Không duyệt</h3>
                <ul class="list-group">
                    <li class="list-group-item" th:each="rental : ${rejected}">
                        <strong th:text="${rental.vehicle.brand + ' ' + rental.vehicle.model}"></strong>
                        <span th:text="${rental.user.email}"></span>
                        <span class="badge bg-danger float-end">Không duyệt</span>
                    </li>
                </ul>
            </div>
        </div>

        <a class="btn btn-secondary mt-4" th:href="@{/admin/dashboard}">Quay lại Dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
