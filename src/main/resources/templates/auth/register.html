<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - EV Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .register-container {
            min-height: 100vh;
            padding: 40px 0;
            background: url('https://cdn2.tuoitre.vn/thumb_w/1200/471584752817336320/2025/1/3/vinfast-1-1735899527194554367571-290-0-964-1287-crop-17358999121591404484154.jpg') center/cover no-repeat fixed;
            position: relative;
        }
        .register-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        .register-card {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin: auto;
            position: relative;
            z-index: 2;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section h1 {
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="container" style="position: relative; z-index: 2;">
            <div class="register-card">
                <!-- Logo -->
                <div class="logo-section">
                    <h1><i class="fas fa-bolt text-warning"></i> EV Rental</h1>
                    <p class="text-muted">Tạo tài khoản mới</p>
                </div>

                <!-- Messages -->
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Register Form -->
                <form method="post" th:action="@{/auth/register}" th:object="${user}">
                    <!-- Thông tin cơ bản -->
                    <div class="mb-3">
                        <label for="fullName" class="form-label fw-bold">Họ và tên</label>
                        <input type="text" class="form-control form-control-lg" id="fullName" th:field="*{fullName}"
                               placeholder="Nhập họ tên đầy đủ" required>
                        <small class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></small>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control form-control-lg" id="email" th:field="*{email}"
                               placeholder="Nhập email của bạn" required>
                        <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                    </div>

                    <div class="mb-3">
                        <label for="phoneNumber" class="form-label fw-bold">Số điện thoại</label>
                        <input type="tel" class="form-control form-control-lg" id="phoneNumber" th:field="*{phoneNumber}"
                               placeholder="Nhập số điện thoại" required>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label fw-bold">Địa chỉ</label>
                        <input type="text" class="form-control form-control-lg" id="address" th:field="*{address}"
                               placeholder="Nhập địa chỉ của bạn" required>
                    </div>

                    <!-- Thông tin giấy tờ -->
                    <div class="mb-3">
                        <label for="idCardNumber" class="form-label fw-bold">Số CMND/CCCD</label>
                        <input type="text" class="form-control form-control-lg" id="idCardNumber" th:field="*{idCardNumber}"
                               placeholder="Nhập số CMND hoặc CCCD" required>
                    </div>

                    <!-- Mật khẩu -->
                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">Mật khẩu</label>
                        <input type="password" class="form-control form-control-lg" id="password" th:field="*{password}"
                               placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" required>
                        <small class="text-muted">Mật khẩu phải chứa ít nhất 6 ký tự</small>
                        <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label fw-bold">Xác nhận mật khẩu</label>
                        <input type="password" class="form-control form-control-lg" id="confirmPassword" 
                               placeholder="Nhập lại mật khẩu" required>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">
                            Tôi đồng ý với <a href="#" class="text-decoration-none">Điều khoản sử dụng</a> và 
                            <a href="#" class="text-decoration-none">Chính sách bảo mật</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3">
                        <i class="fas fa-user-plus"></i> Đăng Ký
                    </button>
                </form>

                <!-- Login Link -->
                <div class="text-center">
                    <p class="text-muted">Đã có tài khoản? 
                        <a th:href="@{/auth/login}" class="fw-bold text-decoration-none">Đăng nhập tại đây</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form')?.addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Mật khẩu không khớp!');
            }
        });
    </script>
</body>
</html>
