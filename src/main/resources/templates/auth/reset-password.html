<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu - EV Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .reset-card {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section h1 {
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="container">
            <div class="reset-card mx-auto">
                <!-- Logo -->
                <div class="logo-section">
                    <h1><i class="fas fa-bolt text-warning"></i> EV Rental</h1>
                    <p class="text-muted">Tạo mật khẩu mới</p>
                </div>

                <!-- Messages -->
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Reset Password Form -->
                <form method="post" th:action="@{/auth/reset-password}">
                    <input type="hidden" name="token" th:value="${token}">

                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">Mật khẩu mới</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password"
                               placeholder="Nhập mật khẩu mới" required>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label fw-bold">Xác nhận mật khẩu</label>
                        <input type="password" class="form-control form-control-lg" id="confirmPassword" name="confirmPassword"
                               placeholder="Nhập lại mật khẩu mới" required>
                        <small class="text-muted">Hai mật khẩu phải giống nhau</small>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3">
                        <i class="fas fa-key"></i> Cập Nhật Mật Khẩu
                    </button>
                </form>

                <!-- Back to Login -->
                <div class="text-center">
                    <p class="text-muted">
                        <a th:href="@{/auth/login}" class="text-decoration-none">
                            <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form')?.addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Mật khẩu không khớp!');
            }
        });
    </script>
</body>
</html>
