<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyến đi của tôi - EV Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="display-4">Lịch sử chuyến đi</h1>
        
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#pending">Đang xử lý</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#confirmed">Đã duyệt</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#rejected">Không duyệt</a>
            </li>
        </ul>

        <div class="tab-content">
            <div id="pending" class="tab-pane fade show active">
                <div th:if="${#lists.isEmpty(rentals)}" class="alert alert-info">
                    Bạn chưa có yêu cầu thuê xe nào.
                </div>
                <div th:each="rental : ${rentals}" th:if="${rental.status == 'PENDING'}" class="card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <img th:src="${rental.vehicle?.imageUrl}" class="img-fluid rounded" alt="Vehicle">
                            </div>
                            <div class="col-md-6">
                                <h5 th:text="${rental.vehicle?.brand + ' ' + rental.vehicle?.model}"></h5>
                                <p class="text-muted" th:text="${rental.pickupDateTime != null ? rental.pickupDateTime.toString().replace('T', ' ').substring(0, 16) : 'N/A'} + ' - ' + ${rental.returnDateTime != null ? rental.returnDateTime.toString().replace('T', ' ').substring(0, 16) : 'N/A'}"></p>
                                <p><strong>Tổng giá:</strong> <span th:text="${rental.totalPrice != null ? rental.totalPrice : 0} + ' đ'"></span></p>
                                <span class="badge bg-warning">Đang xử lý</span>
                            </div>
                            <div class="col-md-3">
                                <a th:href="@{/vehicles/{id}(id=${rental.vehicle?.id})}" class="btn btn-primary w-100 mb-2">Chi tiết</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="confirmed" class="tab-pane fade">
                <div th:if="${#lists.isEmpty(rentals)}" class="alert alert-info">Không có chuyến đã duyệt</div>
                <div th:each="rental : ${rentals}" th:if="${rental.status == 'CONFIRMED'}" class="card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <img th:src="${rental.vehicle?.imageUrl}" class="img-fluid rounded" alt="Vehicle">
                            </div>
                            <div class="col-md-6">
                                <h5 th:text="${rental.vehicle?.brand + ' ' + rental.vehicle?.model}"></h5>
                                <p class="text-muted" th:text="${rental.pickupDateTime != null ? rental.pickupDateTime.toString().replace('T', ' ').substring(0, 16) : 'N/A'} + ' - ' + ${rental.returnDateTime != null ? rental.returnDateTime.toString().replace('T', ' ').substring(0, 16) : 'N/A'}"></p>
                                <p><strong>Tổng giá:</strong> <span th:text="${rental.totalPrice != null ? rental.totalPrice : 0} + ' đ'"></span></p>
                                <span class="badge bg-success">Đã duyệt</span>
                            </div>
                            <div class="col-md-3">
                                <a th:href="@{/vehicles/{id}(id=${rental.vehicle?.id})}" class="btn btn-primary w-100">Chi tiết</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="rejected" class="tab-pane fade">
                <div th:if="${#lists.isEmpty(rentals)}" class="alert alert-info">Không có yêu cầu bị từ chối</div>
                <div th:each="rental : ${rentals}" th:if="${rental.status == 'REJECTED'}" class="card mb-3">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <img th:src="${rental.vehicle?.imageUrl}" class="img-fluid rounded" alt="Vehicle">
                            </div>
                            <div class="col-md-6">
                                <h5 th:text="${rental.vehicle?.brand + ' ' + rental.vehicle?.model}"></h5>
                                <p class="text-muted" th:text="${rental.pickupDateTime != null ? rental.pickupDateTime.toString().replace('T', ' ').substring(0, 16) : 'N/A'} + ' - ' + ${rental.returnDateTime != null ? rental.returnDateTime.toString().replace('T', ' ').substring(0, 16) : 'N/A'}"></p>
                                <p><strong>Tổng giá:</strong> <span th:text="${rental.totalPrice != null ? rental.totalPrice : 0} + ' đ'"></span></p>
                                <span class="badge bg-danger">Không duyệt</span>
                            </div>
                            <div class="col-md-3">
                                <a th:href="@{/vehicles/{id}(id=${rental.vehicle?.id})}" class="btn btn-primary w-100">Chi tiết</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
