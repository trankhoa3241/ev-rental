<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả tìm kiếm - EV Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Kết quả tìm kiếm</h1>
        <p class="text-muted">Tìm thấy <strong th:text="${vehicles.size()}">0</strong> xe phù hợp với tiêu chí của bạn</p>

        <div class="row mt-4" th:if="${vehicles.isEmpty()}">
            <div class="col-md-12">
                <div class="alert alert-info">Không tìm thấy xe phù hợp. Thử thay đổi điều kiện tìm kiếm.</div>
            </div>
        </div>

        <div class="row mt-4" th:unless="${vehicles.isEmpty()}">
            <div class="col-md-4 mb-3" th:each="vehicle : ${vehicles}">
    <div class="card h-100 shadow-sm">
        <img th:src="${vehicle.imageUrl}" class="card-img-top" 
             th:style="${vehicle.isAvailable} ? 'height: 180px; object-fit: cover;' : 'height: 180px; object-fit: cover; filter: grayscale(100%); opacity: 0.6;'">
        
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <h5 class="card-title" th:text="${vehicle.brand + ' ' + vehicle.model}"></h5>
                <span th:if="${vehicle.isAvailable}" class="badge bg-success">Sẵn sàng</span>
                <span th:unless="${vehicle.isAvailable}" class="badge bg-danger">Đã được thuê</span>
            </div>

            <p class="text-muted mb-1" th:text="${vehicle.vehicleType == 'MOTORCYCLE' ? 'Xe máy' : 'Ô tô'}"></p>
            <p class="fw-bold text-primary">
                Giá: <span th:text="'₫' + ${#numbers.formatInteger(vehicle.pricePerHour, 0)}"></span>/giờ
            </p>

            <a th:href="@{/vehicles/{id}(id=${vehicle.id})}" 
               class="btn w-100" 
               th:classappend="${vehicle.isAvailable} ? 'btn-primary' : 'btn-secondary'">
               Xem chi tiết
            </a>
        </div>
    </div>
</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
