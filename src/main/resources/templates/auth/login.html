<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - EV Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: url('https://cdn2.tuoitre.vn/thumb_w/1200/471584752817336320/2025/1/3/vinfast-1-1735899527194554367571-290-0-964-1287-crop-17358999121591404484154.jpg') center/cover no-repeat fixed;
            position: relative;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 2;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section h1 {
            color: #667eea;
            font-weight: bold;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
        }
        .divider::before,
        .divider::after {
            content: '';
            display: inline-block;
            width: 45%;
            height: 1px;
            background: #ddd;
            vertical-align: middle;
        }
        .divider::before {
            margin-right: 10px;
        }
        .divider::after {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="container">
            <div class="login-card mx-auto">
                <!-- Logo -->
                <div class="logo-section">
                    <h1><i class="fas fa-bolt text-warning"></i> EV Rental</h1>
                    <p class="text-muted">Đăng nhập vào tài khoản của bạn</p>
                </div>

                <!-- Messages -->
                <div th:if="${param.registered}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i> Đăng ký thành công! Vui lòng đăng nhập.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle"></i> Email hoặc mật khẩu không chính xác.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Login Form -->
                <form method="post" th:action="@{/auth/login}" class="mb-3">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control form-control-lg" id="username" name="username" 
                               placeholder="Nhập email của bạn" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">Mật khẩu</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" 
                               placeholder="Nhập mật khẩu" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember-me">
                            <label class="form-check-label" for="remember">Nhớ tôi</label>
                        </div>
                        <a th:href="@{/auth/forgot-password}" class="text-decoration-none">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3">
                        <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">hoặc</div>

                <!-- OAuth2 Login -->
                <div class="d-grid gap-2 mb-4">
                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger btn-lg">
                        <i class="fab fa-google"></i> Đăng nhập với Google
                    </a>
                </div>

                <!-- Register Link -->
                <div class="text-center">
                    <p class="text-muted">Chưa có tài khoản? 
                        <a th:href="@{/auth/register}" class="fw-bold text-decoration-none">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
