<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - EV Rental System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .forgot-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .forgot-card {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section h1 {
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="container">
            <div class="forgot-card mx-auto">
                <!-- Logo -->
                <div class="logo-section">
                    <h1><i class="fas fa-bolt text-warning"></i> EV Rental</h1>
                    <p class="text-muted">Đặt lại mật khẩu</p>
                </div>

                <!-- Info -->
                <div class="alert alert-info mb-4">
                    <i class="fas fa-info-circle"></i> Nhập email của bạn để nhận hướng dẫn đặt lại mật khẩu.
                </div>

                <!-- Messages -->
                <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Forgot Password Form -->
                <form method="post" th:action="@{/auth/forgot-password}">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email"
                               placeholder="Nhập email của bạn" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3">
                        <i class="fas fa-envelope"></i> Gửi hướng dẫn
                    </button>
                </form>

                <!-- Back to Login -->
                <div class="text-center">
                    <p class="text-muted">
                        <a th:href="@{/auth/login}" class="text-decoration-none">
                            <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
